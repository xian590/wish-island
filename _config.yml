# Jekyll configuration for GitHub Pages
# Minimal config for pure static HTML app

title: "许愿岛"
description: "用科学方法温柔你的每一天。许愿、放松、积极宣言、成长日记、卡牌参考，一站式成长工具。"

# Exclude non-essential files from Jekyll build
exclude:
  - "deploy-guide.md"
  - "README.md"
  - "*.zip"
  - "*.bat"
  - "*.py"
  - "*.js"  # build/audit scripts only; app.js is needed

# Disable Jekyll processing for pure HTML
plugins: []
