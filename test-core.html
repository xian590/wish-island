let testLock = false;
let testSelected = null;

// ========== 工具函数 ==========
function $(id){ return document.getElementById(id); }
function showPage(name){
  document.querySelectorAll('.page,.welcome').forEach(p=>p.classList.remove('active'));
  const el = $('page-'+name);
  if(el) el.classList.add('active');
}
function showModal(id){ $(id).classList.add('show'); }
function hideModal(id){ $(id).classList.remove('show'); }

// ========== 测试系统 ==========
function startWelcomeTest(){ startTest('personality'); }

function startTest(type){
  testState = { type, questions:PERSONALITY_TEST, scores:{action:0,create:0,empathy:0,stable:0,charm:0}, current:0, answers:[] };
  testLock = false;
  testSelected = null;
  renderTestQ();
  showModal('test-modal');
}

function renderTestQ(){
  const c = $('test-content');
  if(!testState || testState.current >= testState.questions.length){ finishTest(); return; }
  const q = testState.questions[testState.current];
  const total = testState.questions.length;
  const cur = testState.current + 1;
  
  let opts = '';
  q.options.forEach((o,i)=>{
    opts += `<button onclick="selectTestOpt(${i})" class="option" id="opt-${i}"><span style="display:inline-block;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#E8DEEF,#D4C5E0);color:#8B7E9C;text-align:center;line-height:24px;font-size:12px;margin-right:8px">${String.fromCharCode(65+i)}</span>${o.text}</button>`;
  });
  
  c.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span class="text-sm">第 ${cur} / ${total} 题</span>
      <button onclick="closeTest()" style="background:none;border:none;font-size:20px;color:#B8A9C9;cursor:pointer">×</button>
    </div>
    <div class="progress"><div class="progress-bar" style="width:${(cur/total)*100}%"></div></div>
    <h3 style="margin:16px 0;font-size:16px;text-align:center">${q.q}</h3>
    <div>${opts}</div>
    <button id="test-next-btn" onclick="nextTestQ()" class="btn" disabled style="opacity:0.5">${cur===total?'✨ 查看结果':'下一题 →'}</button>
  `;
}

function selectTestOpt(i){
  if(testLock) return;
  testSelected = i;
  document.querySelectorAll('.option').forEach((b,idx)=>{
    if(idx===i) b.classList.add('selected');
    else b.classList.remove('selected');
  });
  const btn = $('test-next-btn');
  if(btn){ btn.disabled = false; btn.style.opacity = '1'; }
}

function nextTestQ(){
  if(testSelected === null) return;
  if(testLock) return;
  testLock = true;
  
  const q = testState.questions[testState.current];
  const opt = q.options[testSelected];
  const s = opt.scores;
  testState.scores.action += s.action;
  testState.scores.create += s.create;
  testState.scores.empathy += s.empathy;
  testState.scores.stable += s.stable;
  testState.scores.charm += s.charm;
  
  testState.answers.push({ q:q.q, a:opt.text });
  testState.current++;
  testSelected = null;
  
  if(testState.current >= testState.questions.length){
    testLock = false;
    finishTest();
  } else {
    renderTestQ();
    testLock = false;
  }
}

function calcPersona(scores){
  const { action, create, empathy, stable, charm } = scores;
  const sorted = [
    {k:'action',v:action},{k:'create',v:create},{k:'empathy',v:empathy},{k:'stable',v:stable},{k:'charm',v:charm}
  ].sort((a,b)=>b.v-a.v);
  const top = sorted[0].k;
  if(top==='action') return 'rose';
  if(top==='create') return 'lavender';
  if(top==='stable') return 'lily';
  if(top==='empathy') return 'iris';
  return 'camellia';
}

function finishTest(){
  const pid = calcPersona(testState.scores);
  const p = PERSONAS.find(x=>x.id===pid);
  if(!p) return;
  
  if(!state.unlockedPersonas.includes(pid)) state.unlockedPersonas.push(pid);
  state.mainPersona = pid;
  
  const { action, create, empathy, stable, charm } = testState.scores;
  const total = action + create + empathy + stable + charm;
  const aPct = Math.round(action/total*100);
  const cPct = Math.round(create/total*100);
  const ePct = Math.round(empathy/total*100);
  const sPct = Math.round(stable/total*100);
  const chPct = Math.round(charm/total*100);
  
  $('test-content').innerHTML = `
    <div class="center">
      <div style="font-size:48px;margin-bottom:12px">🎉</div>
      <h3 style="margin-bottom:8px">人格测试完成！</h3>
      <p class="text-sm mb-4">解锁了你的专属花公主身份！</p>
      <div style="width:80px;height:80px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,${p.flowerColor1},${p.flowerColor2})">${p.flower}</div>
      <h2 style="color:${p.color};margin-bottom:4px">${p.name}</h2>
      <p class="text-sm">${p.flower} · ${p.animal} · ${p.trait}主导</p>
      <div class="glass-card" style="margin:16px 0;text-align:left">
        <p style="font-size:12px;margin-bottom:8px">五特质占比</p>
        <div style="font-size:12px;line-height:2">
          <div>🔥 行动 ${aPct}%</div><div style="height:6px;background:rgba(212,181,199,0.15);border-radius:999px"><div style="height:100%;background:#D4A5B8;border-radius:999px;width:${aPct}%"></div></div>
          <div>🎨 创造 ${cPct}%</div><div style="height:6px;background:rgba(212,181,199,0.15);border-radius:999px"><div style="height:100%;background:#B8A9C9;border-radius:999px;width:${cPct}%"></div></div>
          <div>💗 共情 ${ePct}%</div><div style="height:6px;background:rgba(212,181,199,0.15);border-radius:999px"><div style="height:100%;background:#F0D5E0;border-radius:999px;width:${ePct}%"></div></div>
          <div>🌿 稳定 ${sPct}%</div><div style="height:6px;background:rgba(212,181,199,0.15);border-radius:999px"><div style="height:100%;background:#88C898;border-radius:999px;width:${sPct}%"></div></div>
          <div>✨ 魅力 ${chPct}%</div><div style="height:6px;background:rgba(212,181,199,0.15);border-radius:999px"><div style="height:100%;background:#E8C87A;border-radius:999px;width:${chPct}%"></div></div>
        </div>
      </div>
      <button onclick="enterIslandFromTest('${pid}')" class="btn">🏝️ 进入我的岛屿</button>
      <button onclick="viewPersona('${pid}')" class="btn btn-secondary">查看人格详情</button>
    </div>
  `;
}

function closeTest(){
  if(confirm('确定要退出测试吗？')){
    hideModal('test-modal');
    testState = null;
    testLock = false;
  }
}

function enterIslandFromTest(pid){
  hideModal('test-modal');
  testState = null;
  showPage('island');
  setTimeout(()=>startTutorial(), 500);
}

function viewPersona(id){
  const p = PERSONAS.find(x=>x.id===id);
  if(!p) return;
  hideModal('test-modal');
  testState = null;
  $('persona-detail').innerHTML = `
    <div class="center">
      <div style="font-size:48px;margin-bottom:8px">${p.flower}</div>
      <h2 style="color:${p.color}">${p.name}</h2>
      <p class="text-sm">代表花：${p.flower} · 代表动物：${p.animal}</p>
      <div style="display:flex;gap:8px;justify-content:center;margin:12px 0">
        <span style="background:${p.color}20;color:${p.color};padding:4px 12px;border-radius:999px;font-size:12px">${p.trait}主导</span>
        <span style="background:${p.color}20;color:${p.color};padding:4px 12px;border-radius:999px;font-size:12px">${p.second}辅助</span>
      </div>
      <div class="glass-card" style="text-align:left;margin:12px 0">
        <p style="font-size:13px;margin-bottom:8px"><b>💖 核心显化优势</b></p>
        <p class="text-sm">${p.advantage}</p>
      </div>
      <div class="glass-card" style="text-align:left;margin:12px 0">
        <p style="font-size:13px;margin-bottom:8px"><b>⚠️ 核心卡点信念</b></p>
        <p class="text-sm">${p.topBelief}</p>
      </div>
      <div class="glass-card" style="text-align:left;margin:12px 0">
        <p style="font-size:13px;margin-bottom:8px"><b>🎯 专属显化节奏</b></p>
        <p class="text-sm">${p.rhythm}</p>
      </div>
    </div>
  `;
  showModal('persona-modal');
}

function closePersona(){ hideModal('persona-modal'); }

// ========== 新手引导 ==========
const TUTORIAL_STEPS = [
  { emoji:'👋', title:'公主你好呀~', desc:'欢迎来到你的专属星愿花园！让我带你逛逛这座神奇的小岛吧 ✨' },
  { emoji:'🏝️', title:'这是你的许愿岛', desc:'岛上的每一座小房子都是一个显化功能哦～点一点试试它们都有什么魔法吧 🌸' },
  { emoji:'🧭', title:'底部导航栏', desc:'底部可以切换不同页面：岛屿是主界面、显化是工具合集、书馆有书和电影、记录看你的成长～' }
];

function startTutorial(){
  tutorialStep = 0;
  showTutorialStep();
}

function showTutorialStep(){
  const step = TUTORIAL_STEPS[tutorialStep];
  if(!step){ finishTutorial(); return; }
  $('tutorial-emoji').textContent = step.emoji;
  $('tutorial-title').textContent = step.title;
  $('tutorial-desc').textContent = step.desc;
  $('tutorial-next-btn').textContent = tutorialStep === TUTORIAL_STEPS.length-1 ? '开始探索 ✨' : '下一步 →';
  $('tutorial-overlay').classList.add('show');
}

function nextTutorialStep(){
  tutorialStep++;
  if(tutorialStep >= TUTORIAL_STEPS.length) finishTutorial();
  else showTutorialStep();
}

function skipTutorial(){ finishTutorial(); }

function finishTutorial(){
  $('tutorial-overlay').classList.remove('show');
}

// ========== 初始化 ==========
function init(){
  showPage('welcome');
}

init();
</script>
