<!-- ============================================================
     书籍仿真翻书模块 - 宇宙许愿岛
     包含：HTML结构 + CSS样式 + JS交互逻辑
     功能：翻页、书签、笔记、页码、本地存储
============================================================ -->

<!-- ========== 书籍阅读器模态框 ========== -->
<div id="book-reader-modal" class="book-reader-modal hidden">
  <div class="book-reader-overlay" onclick="closeBookReader()"></div>
  <div class="book-reader-container">
    <!-- 顶部工具栏 -->
    <div class="book-reader-header">
      <div class="flex items-center gap-3">
        <button onclick="closeBookReader()" class="book-reader-btn-icon" title="关闭">✕</button>
        <div>
          <div class="book-reader-title" id="br-book-title">书名</div>
          <div class="book-reader-author" id="br-book-author">作者</div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="toggleBookmark()" id="br-bookmark-btn" class="book-reader-btn-icon" title="书签">🔖</button>
        <button onclick="toggleNotePanel()" id="br-note-btn" class="book-reader-btn-icon" title="笔记">📝</button>
        <button onclick="toggleToc()" class="book-reader-btn-icon" title="目录">📑</button>
      </div>
    </div>

    <!-- 主体区域：书页 + 目录侧栏 + 笔记侧栏 -->
    <div class="book-reader-body">
      <!-- 目录侧栏 -->
      <div id="br-toc-panel" class="br-toc-panel hidden">
        <div class="br-toc-header">📑 目录</div>
        <div class="br-toc-list" id="br-toc-list"></div>
      </div>

      <!-- 书页区域 -->
      <div class="book-pages-wrapper" id="br-pages-wrapper">
        <div class="book-pages-container" id="br-pages-container">
          <!-- 左页 -->
          <div class="book-page book-page-left" id="br-page-left">
            <div class="book-page-content" id="br-page-left-content"></div>
            <div class="book-page-number" id="br-page-left-num"></div>
          </div>
          <!-- 书脊阴影 -->
          <div class="book-spine-shadow"></div>
          <!-- 右页 -->
          <div class="book-page book-page-right" id="br-page-right">
            <div class="book-page-content" id="br-page-right-content"></div>
            <div class="book-page-number" id="br-page-right-num"></div>
          </div>
        </div>

        <!-- 翻页按钮 -->
        <button class="br-page-btn br-page-prev" onclick="prevPage()" id="br-prev-btn">
          <span>‹</span>
        </button>
        <button class="br-page-btn br-page-next" onclick="nextPage()" id="br-next-btn">
          <span>›</span>
        </button>
      </div>

      <!-- 笔记侧栏 -->
      <div id="br-note-panel" class="br-note-panel hidden">
        <div class="br-note-header">
          <span>📝 我的笔记</span>
          <span class="br-note-count" id="br-note-count">0条</span>
        </div>
        <div class="br-note-input-area">
          <textarea id="br-note-input" class="br-note-textarea" placeholder="在这一页写下你的想法和感悟..."></textarea>
          <button onclick="addNote()" class="br-note-add-btn">💾 保存笔记</button>
        </div>
        <div class="br-note-list" id="br-note-list">
          <div class="br-note-empty">
            <div class="text-3xl mb-2">📖</div>
            <div class="text-xs opacity-60">还没有笔记<br/>边读边记，收获更大哦～</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部页码栏 -->
    <div class="book-reader-footer">
      <div class="flex items-center gap-3">
        <span class="br-page-info">
          第 <span id="br-current-spread">1</span> / <span id="br-total-spreads">1</span> 页
        </span>
        <div class="br-progress-bar">
          <div class="br-progress-fill" id="br-progress-fill"></div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="goToPage(0)" class="br-mini-btn" title="封面">🏠</button>
        <button onclick="prevPage()" class="br-mini-btn">← 上一页</button>
        <button onclick="nextPage()" class="br-mini-btn">下一页 →</button>
      </div>
    </div>
  </div>
</div>

<!-- ========== JavaScript 逻辑 ========== -->
<script>
// ============================================================
//  书籍阅读器状态
// ============================================================
let currentBook = null;
let currentSpread = 0; // 当前跨页索引
let bookPages = []; // 当前书的分页内容
let bookToc = []; // 目录
let brShowToc = false;
let brShowNote = false;

// ============================================================
//  打开书籍阅读器
// ============================================================
function openBookReader(bookId) {
  const book = BOOK_DETAILS[bookId];
  if (!book) return;
  
  currentBook = book;
  currentSpread = 0;
  
  // 生成页面内容
  buildBookPages(book);
  buildBookToc(book);
  
  // 更新标题
  document.getElementById('br-book-title').textContent = book.title;
  document.getElementById('br-book-author').textContent = book.author;
  
  // 渲染第一页
  renderSpread(0);
  updatePageNav();
  updateBookmarkBtn();
  renderNotes();
  
  // 显示
  document.getElementById('book-reader-modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  
  // 重置侧栏
  brShowToc = false;
  brShowNote = false;
  document.getElementById('br-toc-panel').classList.add('hidden');
  document.getElementById('br-note-panel').classList.add('hidden');
}

function closeBookReader() {
  document.getElementById('book-reader-modal').classList.add('hidden');
  document.body.style.overflow = '';
  currentBook = null;
}

// ============================================================
//  构建书页内容（将书籍内容分页）
// ============================================================
function buildBookPages(book) {
  bookPages = [];
  
  // 第1页：封面
  bookPages.push({
    type: 'cover',
    content: `
      <div class="book-cover-page">
        <div class="cover-icon">${book.cover}</div>
        <div class="cover-title">${book.title}</div>
        <div class="cover-author">${book.author}</div>
        <div class="cover-tag">${book.level}</div>
        <div class="cover-quote">「 ${book.intro.whyRead} 」</div>

    `,
    tocLabel: '封面'
  });
  
  // 第2页：书籍介绍
  bookPages.push({
    type: 'intro',
    content: `
      <h2>📖 关于这本书</h2>
      <p>${book.intro.book}</p>
      <h3>👤 关于作者</h3>
      <p>${book.intro.author}</p>
      <div class="highlight-box">
        <div class="box-title">💡 为什么读这本书？</div>
        <p class="no-indent" style="margin:0">${book.intro.whyRead}</p>
      </div>
    `,
    tocLabel: '书籍介绍'
  });
  
  // 核心观点章节
  book.coreIdeas.forEach((idea, idx) => {
    bookPages.push({
      type: 'core-idea',
      content: `
        <h2>核心观点 ${idx + 1}</h2>
        <h3>${idea.title}</h3>
        ${idea.content.split('\n\n').map(p => `<p>${p}</p>`).join('')}
      `,
      tocLabel: `${idx + 1}. ${idea.title}`
    });
  });
  
  // 核心方法章节
  bookPages.push({
    type: 'methods-intro',
    content: `<h2>🛠️ 核心方法</h2>
      <p style="text-indent:0">这本书介绍了以下 ${book.methods.length} 个核心方法，每个方法都有详细步骤和例子，跟着做就能上手 👇</p>
      <ul>
        ${book.methods.map((m, i) => `<li><b>方法${i+1}：${m.title}</b></li>`).join('')}
      </ul>`,
    tocLabel: '核心方法'
  });
  
  book.methods.forEach((method, idx) => {
    bookPages.push({
      type: 'method',
      content: `
        <h3>方法 ${idx + 1}：${method.title}</h3>
        <p style="text-indent:0"><b>📝 操作步骤：</b></p>
        <ol>
          ${method.steps.map(s => `<li>${s}</li>`).join('')}
        </ol>
        <div class="highlight-box">
          <div class="box-title">💡 举个例子</div>
          <p class="no-indent" style="margin:0">${method.example}</p>
        </div>
      `,
      tocLabel: `方法${idx+1}: ${method.title}`
    });
  });
  
  // 新手误区
  bookPages.push({
    type: 'mistakes',
    content: `
      <h2>⚠️ 新手常见误区</h2>
      <p style="text-indent:0">刚开始学习的时候，很容易踩这些坑。来看看你有没有中招～</p>
      ${book.mistakes.map((m, i) => `
        <div style="margin-bottom:14px">
          <p style="text-indent:0"><b>❓ 误区${i+1}：${m.q}</b></p>
          <p style="margin-top:4px">${m.a}</p>
        </div>
      `).join('')}
    `,
    tocLabel: '新手误区'
  });
  
  // 本周练习
  bookPages.push({
    type: 'practice',
    content: `
      <h2>📅 本周练习作业</h2>
      <p style="text-indent:0">光说不练假把式！跟着下面的计划，一周练下来，你会明显感觉到变化 🌸</p>
      ${book.weeklyPractice.map((day, i) => `
        <div style="margin-bottom:12px; padding:10px 12px; background:rgba(212,181,199,0.1); border-radius:8px">
          <div style="font-weight:600; color:#B8859C; margin-bottom:4px">${day.day}</div>
          <div style="font-size:12px; margin-bottom:4px">${day.task}</div>
          <div style="font-size:11px; color:#8B7E9C; opacity:0.8">💡 ${day.tip}</div>
        </div>
      `).join('')}
    `,
    tocLabel: '本周练习'
  });
  
  // 常见问题
  bookPages.push({
    type: 'faq',
    content: `
      <h2>❓ 常见问题解答</h2>
      <p style="text-indent:0">大家在读这本书的时候，最常问的问题都在这里了～</p>
      ${book.faq.map((q, i) => `
        <div style="margin-bottom:14px">
          <p style="text-indent:0"><b>Q${i+1}：${q.q}</b></p>
          <p style="margin-top:4px"><b>A：</b>${q.a}</p>
        </div>
      `).join('')}
    `,
    tocLabel: '常见问题'
  });
  
  // 最后一页：结语
  bookPages.push({
    type: 'ending',
    content: `
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; padding:40px 20px">
        <div style="font-size:48px; margin-bottom:20px">✨</div>
        <h2 style="border:none; text-align:center; margin-bottom:16px">读完啦！</h2>
        <p style="text-indent:0; max-width:300px; margin-bottom:20px">
          恭喜你读完了《${book.title}》！<br/>
          知识不是力量，<b>行动</b>才是。<br/>
          从今天开始，把书里的方法用起来吧～
        </p>
        <div style="font-size:12px; color:#8B7E9C; opacity:0.7">
          —— 宇宙许愿岛 📚
        </div>
      </div>
    `,
    tocLabel: '结语'
  });
}

// ============================================================
//  构建目录
// ============================================================
function buildBookToc(book) {
  bookToc = bookPages.map((page, idx) => ({
    pageIndex: idx,
    label: page.tocLabel,
    icon: getTocIcon(page.type)
  }));
  
  const tocList = document.getElementById('br-toc-list');
  tocList.innerHTML = bookToc.map((item, idx) => `
    <div class="br-toc-item ${idx === currentSpread ? 'active' : ''}" onclick="goToPage(${item.pageIndex})">
      <span class="toc-icon">${item.icon}</span>
      <span>${item.label}</span>
    </div>
  `).join('');
}

function getTocIcon(type) {
  const icons = {
    'cover': '📕',
    'intro': '📖',
    'core-idea': '💡',
    'methods-intro': '🛠️',
    'method': '📝',
    'mistakes': '⚠️',
    'practice': '📅',
    'faq': '❓',
    'ending': '✨'
  };
  return icons[type] || '📄';
}

// ============================================================
//  渲染跨页（左右两页）
// ============================================================
function renderSpread(spreadIdx) {
  const leftPageIdx = spreadIdx * 2;
  const rightPageIdx = spreadIdx * 2 + 1;
  
  const leftContent = bookPages[leftPageIdx] ? bookPages[leftPageIdx].content : '';
  const rightContent = bookPages[rightPageIdx] ? bookPages[rightPageIdx].content : '';
  
  document.getElementById('br-page-left-content').innerHTML = leftContent;
  document.getElementById('br-page-right-content').innerHTML = rightContent;
  
  document.getElementById('br-page-left-num').textContent = bookPages[leftPageIdx] ? `— ${leftPageIdx + 1} —` : '';
  document.getElementById('br-page-right-num').textContent = bookPages[rightPageIdx] ? `— ${rightPageIdx + 1} —` : '';
  
  // 滚动到顶部
  document.getElementById('br-page-left-content').scrollTop = 0;
  document.getElementById('br-page-right-content').scrollTop = 0;
  
  // 更新目录高亮
  document.querySelectorAll('.br-toc-item').forEach((el, idx) => {
    const itemPageIdx = bookToc[idx]?.pageIndex;
    const isActive = (itemPageIdx >= leftPageIdx && itemPageIdx <= rightPageIdx);
    el.classList.toggle('active', isActive);
  });
}

// ============================================================
//  翻页
// ============================================================
function nextPage() {
  const maxSpread = Math.ceil(bookPages.length / 2) - 1;
  if (currentSpread >= maxSpread) return;
  
  currentSpread++;
  renderSpread(currentSpread);
  updatePageNav();
  updateBookmarkBtn();
  playPageSound();
}

function prevPage() {
  if (currentSpread <= 0) return;
  
  currentSpread--;
  renderSpread(currentSpread);
  updatePageNav();
  updateBookmarkBtn();
  playPageSound();
}

function goToPage(pageIdx) {
  const spreadIdx = Math.floor(pageIdx / 2);
  const maxSpread = Math.ceil(bookPages.length / 2) - 1;
  currentSpread = Math.max(0, Math.min(spreadIdx, maxSpread));
  renderSpread(currentSpread);
  updatePageNav();
  updateBookmarkBtn();
}

function updatePageNav() {
  const maxSpread = Math.ceil(bookPages.length / 2) - 1;
  document.getElementById('br-current-spread').textContent = currentSpread + 1;
  document.getElementById('br-total-spreads').textContent = maxSpread + 1;
  
  const progress = ((currentSpread + 1) / (maxSpread + 1)) * 100;
  document.getElementById('br-progress-fill').style.width = progress + '%';
  
  document.getElementById('br-prev-btn').disabled = currentSpread <= 0;
  document.getElementById('br-next-btn').disabled = currentSpread >= maxSpread;
}

// ============================================================
//  目录切换
// ============================================================
function toggleToc() {
  brShowToc = !brShowToc;
  document.getElementById('br-toc-panel').classList.toggle('hidden', !brShowToc);
  if (brShowToc && brShowNote) {
    brShowNote = false;
    document.getElementById('br-note-panel').classList.add('hidden');
  }
}

// ============================================================
//  书签功能
// ============================================================
function toggleBookmark() {
  if (!currentBook) return;
  
  const bookId = currentBook.id;
  const pageIdx = currentSpread * 2;
  const key = `bookmarks_${bookId}`;
  
  let bookmarks = [];
  try {
    bookmarks = JSON.parse(localStorage.getItem(key) || '[]');
  } catch(e) {}
  
  const existingIdx = bookmarks.findIndex(b => b.spread === currentSpread);
  
  if (existingIdx >= 0) {
    // 取消书签
    bookmarks.splice(existingIdx, 1);
    showBookmarkToast('🔖 已取消书签');
  } else {
    // 添加书签
    const pageLabel = bookPages[pageIdx]?.tocLabel || `第${pageIdx+1}页`;
    bookmarks.push({
      spread: currentSpread,
      page: pageIdx + 1,
      label: pageLabel,
      time: Date.now()
    });
    showBookmarkToast('🔖 已添加书签');
  }
  
  localStorage.setItem(key, JSON.stringify(bookmarks));
  updateBookmarkBtn();
}

function updateBookmarkBtn() {
  if (!currentBook) return;
  
  const bookId = currentBook.id;
  const key = `bookmarks_${bookId}`;
  
  let bookmarks = [];
  try {
    bookmarks = JSON.parse(localStorage.getItem(key) || '[]');
  } catch(e) {}
  
  const isBookmarked = bookmarks.some(b => b.spread === currentSpread);
  const btn = document.getElementById('br-bookmark-btn');
  btn.classList.toggle('active', isBookmarked);
  btn.textContent = isBookmarked ? '📌' : '🔖';
}

function showBookmarkToast(msg) {
  const existing = document.querySelector('.bookmark-toast');
  if (existing) existing.remove();
  
  const toast = document.createElement('div');
  toast.className = 'bookmark-toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 1500);
}

// ============================================================
//  笔记功能
// ============================================================
function toggleNotePanel() {
  brShowNote = !brShowNote;
  document.getElementById('br-note-panel').classList.toggle('hidden', !brShowNote);
  if (brShowNote && brShowToc) {
    brShowToc = false;
    document.getElementById('br-toc-panel').classList.add('hidden');
  }
  document.getElementById('br-note-btn').classList.toggle('active', brShowNote);
}

function addNote() {
  if (!currentBook) return;
  
  const input = document.getElementById('br-note-input');
  const text = input.value.trim();
  if (!text) return;
  
  const bookId = currentBook.id;
  const pageIdx = currentSpread * 2;
  const key = `notes_${bookId}`;
  
  let notes = [];
  try {
    notes = JSON.parse(localStorage.getItem(key) || '[]');
  } catch(e) {}
  
  const pageLabel = bookPages[pageIdx]?.tocLabel || `第${pageIdx+1}页`;
  
  notes.unshift({
    id: Date.now(),
    spread: currentSpread,
    page: pageIdx + 1,
    pageLabel: pageLabel,
    text: text,
    time: Date.now()
  });
  
  localStorage.setItem(key, JSON.stringify(notes));
  input.value = '';
  renderNotes();
  
  showBookmarkToast('📝 笔记已保存');
}

function deleteNote(noteId) {
  if (!currentBook) return;
  
  const bookId = currentBook.id;
  const key = `notes_${bookId}`;
  
  let notes = [];
  try {
    notes = JSON.parse(localStorage.getItem(key) || '[]');
  } catch(e) {}
  
  notes = notes.filter(n => n.id !== noteId);
  localStorage.setItem(key, JSON.stringify(notes));
  renderNotes();
}

function renderNotes() {
  if (!currentBook) return;
  
  const bookId = currentBook.id;
  const key = `notes_${bookId}`;
  
  let notes = [];
  try {
    notes = JSON.parse(localStorage.getItem(key) || '[]');
  } catch(e) {}
  
  document.getElementById('br-note-count').textContent = `${notes.length}条`;
  
  const listEl = document.getElementById('br-note-list');
  
  if (notes.length === 0) {
    listEl.innerHTML = `
      <div class="br-note-empty">
        <div class="text-3xl mb-2">📖</div>
        <div class="text-xs opacity-60">还没有笔记<br/>边读边记，收获更大哦～</div>
      </div>
    `;
    return;
  }
  
  listEl.innerHTML = notes.map(n => `
    <div class="br-note-item">
      <div class="note-page">📄 ${n.pageLabel} · 第${n.page}页</div>
      <div class="note-text">${escapeHtml(n.text)}</div>
      <button class="note-delete" onclick="deleteNote(${n.id})" title="删除">✕</button>
    </div>
  `).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ============================================================
//  翻页音效（轻量）
// ============================================================
function playPageSound() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 800;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
  } catch(e) {}
}

// ============================================================
//  键盘快捷键
// ============================================================
document.addEventListener('keydown', function(e) {
  if (document.getElementById('book-reader-modal').classList.contains('hidden')) return;
  
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    nextPage();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    prevPage();
  } else if (e.key === 'Escape') {
    closeBookReader();
  }
});

// ============================================================
//  触摸滑动翻页
// ============================================================
(function initTouchSwipe() {
  let startX = 0;
  let startY = 0;
  const wrapper = document.getElementById('br-pages-wrapper');
  
  if (!wrapper) return;
  
  wrapper.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  
  wrapper.addEventListener('touchend', function(e) {
    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;
    const diffX = endX - startX;
    const diffY = endY - startY;
    
    if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
      if (diffX > 0) {
        prevPage();
      } else {
        nextPage();
      }
    }
  }, { passive: true });
})();
</script>
